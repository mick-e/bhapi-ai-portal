<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bhapi AI Safety Monitor</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
                   "Helvetica Neue", Arial, sans-serif;
      width: 360px;
      min-height: 200px;
      background: #f8f9fa;
      color: #1a1a2e;
    }

    /* ---- Header ---- */
    .header {
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      color: #ffffff;
      padding: 16px 20px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .header-icon {
      width: 32px;
      height: 32px;
      background: #e94560;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      font-size: 16px;
      flex-shrink: 0;
    }

    .header-text h1 {
      font-size: 15px;
      font-weight: 600;
      margin-bottom: 2px;
    }

    .header-text p {
      font-size: 11px;
      opacity: 0.7;
    }

    /* ---- Status bar ---- */
    .status-bar {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 20px;
      font-size: 13px;
      border-bottom: 1px solid #e0e0e0;
    }

    .status-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .status-dot.connected { background: #28a745; }
    .status-dot.disconnected { background: #dc3545; }
    .status-dot.unconfigured { background: #ffc107; }

    .status-label {
      flex: 1;
    }

    /* ---- Sections ---- */
    .section {
      padding: 16px 20px;
      border-bottom: 1px solid #e0e0e0;
    }

    .section:last-child {
      border-bottom: none;
    }

    .section-title {
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: #6c757d;
      margin-bottom: 10px;
    }

    /* ---- Setup form ---- */
    .form-group {
      margin-bottom: 12px;
    }

    .form-group label {
      display: block;
      font-size: 12px;
      font-weight: 500;
      margin-bottom: 4px;
      color: #495057;
    }

    .form-group input[type="text"],
    .form-group input[type="url"] {
      width: 100%;
      padding: 8px 10px;
      border: 1px solid #ced4da;
      border-radius: 6px;
      font-size: 13px;
      outline: none;
      transition: border-color 0.2s;
    }

    .form-group input:focus {
      border-color: #e94560;
      box-shadow: 0 0 0 2px rgba(233, 69, 96, 0.15);
    }

    /* ---- Toggle ---- */
    .toggle-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 0;
    }

    .toggle-row label {
      font-size: 14px;
      font-weight: 500;
    }

    .toggle-switch {
      position: relative;
      width: 44px;
      height: 24px;
    }

    .toggle-switch input {
      opacity: 0;
      width: 0;
      height: 0;
    }

    .toggle-slider {
      position: absolute;
      cursor: pointer;
      inset: 0;
      background-color: #ced4da;
      border-radius: 24px;
      transition: 0.3s;
    }

    .toggle-slider::before {
      content: "";
      position: absolute;
      height: 18px;
      width: 18px;
      left: 3px;
      bottom: 3px;
      background-color: #ffffff;
      border-radius: 50%;
      transition: 0.3s;
    }

    .toggle-switch input:checked + .toggle-slider {
      background-color: #28a745;
    }

    .toggle-switch input:checked + .toggle-slider::before {
      transform: translateX(20px);
    }

    /* ---- Buttons ---- */
    .btn {
      display: inline-block;
      padding: 8px 16px;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: background-color 0.2s, opacity 0.2s;
    }

    .btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .btn-primary {
      background: #e94560;
      color: #ffffff;
    }

    .btn-primary:hover:not(:disabled) {
      background: #d63851;
    }

    .btn-secondary {
      background: #6c757d;
      color: #ffffff;
    }

    .btn-secondary:hover:not(:disabled) {
      background: #5a6268;
    }

    .btn-row {
      display: flex;
      gap: 8px;
      margin-top: 12px;
    }

    /* ---- Info display ---- */
    .info-grid {
      display: grid;
      grid-template-columns: auto 1fr;
      gap: 6px 12px;
      font-size: 12px;
    }

    .info-grid dt {
      color: #6c757d;
      font-weight: 500;
    }

    .info-grid dd {
      color: #1a1a2e;
      word-break: break-all;
    }

    /* ---- Messages ---- */
    .message {
      padding: 8px 12px;
      border-radius: 6px;
      font-size: 12px;
      margin-top: 8px;
    }

    .message.success {
      background: #d4edda;
      color: #155724;
      border: 1px solid #c3e6cb;
    }

    .message.error {
      background: #f8d7da;
      color: #721c24;
      border: 1px solid #f5c6cb;
    }

    /* ---- Hidden state ---- */
    .hidden {
      display: none !important;
    }

    /* ---- Footer ---- */
    .footer {
      padding: 10px 20px;
      text-align: center;
      font-size: 11px;
      color: #adb5bd;
    }
  </style>
</head>
<body>

  <!-- Header -->
  <div class="header">
    <div class="header-icon">B</div>
    <div class="header-text">
      <h1>Bhapi AI Safety Monitor</h1>
      <p>v1.0.0</p>
    </div>
  </div>

  <!-- Connection status -->
  <div class="status-bar">
    <div id="status-dot" class="status-dot unconfigured"></div>
    <span id="status-label" class="status-label">Checking...</span>
  </div>

  <!-- Setup section (shown when not configured) -->
  <div id="setup-section" class="section">
    <div class="section-title">Setup</div>

    <div class="form-group">
      <label for="api-url">Portal URL</label>
      <input type="url" id="api-url" placeholder="https://your-portal.bhapi.ai">
    </div>

    <div class="form-group">
      <label for="setup-code">Setup Code</label>
      <input type="text" id="setup-code" placeholder="Enter your setup code">
    </div>

    <div class="btn-row">
      <button id="btn-pair" class="btn btn-primary">Connect</button>
    </div>

    <div id="setup-message" class="message hidden"></div>
  </div>

  <!-- Monitoring section (shown when configured) -->
  <div id="monitor-section" class="section hidden">
    <div class="section-title">Monitoring</div>

    <div class="toggle-row">
      <label for="toggle-enabled">Enable monitoring</label>
      <label class="toggle-switch">
        <input type="checkbox" id="toggle-enabled">
        <span class="toggle-slider"></span>
      </label>
    </div>

    <dl id="info-grid" class="info-grid" style="margin-top: 12px;">
      <dt>Group</dt>
      <dd id="info-group">--</dd>
      <dt>Member</dt>
      <dd id="info-member">--</dd>
      <dt>Platform</dt>
      <dd id="info-platform">--</dd>
      <dt>Last event</dt>
      <dd id="info-last-event">--</dd>
      <dt>Queued</dt>
      <dd id="info-queued">0</dd>
    </dl>

    <div class="btn-row">
      <button id="btn-refresh" class="btn btn-secondary">Refresh</button>
      <button id="btn-disconnect" class="btn btn-secondary">Disconnect</button>
    </div>
  </div>

  <!-- Footer -->
  <div class="footer">
    Bhapi AI Safety Portal
  </div>

  <script src="popup.js"></script>
</body>
</html>
