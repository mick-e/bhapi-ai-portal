# Render Blueprint — Bhapi Platform (formerly Bhapi AI Portal)
# Deploy: connect GitHub repo, Render auto-detects this file.
# Docs: https://docs.render.com/blueprint-spec
# Note: Service names will be updated when mick-e/bhapi-ai-portal is renamed
# to mick-e/bhapi-platform. Service rename requires Render dashboard update.
#
# UNIFIED PLATFORM (Phase 1+):
# A WebSocket real-time service will be added as a separate Render web service
# for chat messaging, presence, and live feed updates. See ADR-008.
# DB connection pooling: monolith=20, jobs=5, websocket=10 (total 35, fits Standard plan).
# Media storage: Cloudflare R2/Images/Stream (external, not Render-hosted). See ADR-007.
#
# ENV VAR MANAGEMENT:
# - Non-secret vars use `value:` so they survive blueprint re-syncs
# - Secrets use `sync: false` — set these ONLY via Render Dashboard
# - NEVER use Render API PUT /env-vars (it REPLACES all vars, wiping secrets)
# - All secrets are also backed up in .env.local (gitignored)
# Required secrets (set in Dashboard): SECRET_KEY, DATABASE_URL, STRIPE_SECRET_KEY,
#   STRIPE_WEBHOOK_SECRET, STRIPE_PUBLISHABLE_KEY, SENDGRID_API_KEY,
#   OAUTH_GOOGLE_CLIENT_ID, OAUTH_GOOGLE_CLIENT_SECRET, OAUTH_MICROSOFT_CLIENT_ID,
#   OAUTH_MICROSOFT_CLIENT_SECRET, OAUTH_APPLE_CLIENT_ID, OAUTH_APPLE_CLIENT_SECRET,
#   OAUTH_APPLE_TEAM_ID, OAUTH_APPLE_KEY_ID, GCP_PROJECT_ID

services:
  # Core API (FastAPI backend + Next.js frontend)
  - type: web
    name: bhapi-core-api
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: starter
    region: frankfurt
    healthCheckPath: /health/live
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: bhapi-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: bhapi-redis
          type: redis
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: CORS_ORIGINS
        value: https://bhapi.ai,https://www.bhapi.ai
      - key: CAPTURE_HMAC_ENABLED
        value: "true"
      - key: CAPTURE_HMAC_SECRET
        generateValue: true
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: STRIPE_PUBLISHABLE_KEY
        sync: false
      - key: SENDGRID_API_KEY
        sync: false
      - key: GCP_PROJECT_ID
        sync: false
      - key: COOKIE_DOMAIN
        value: bhapi.ai
      - key: OAUTH_REDIRECT_BASE_URL
        value: https://bhapi.ai
      - key: OAUTH_GOOGLE_CLIENT_ID
        sync: false
      - key: OAUTH_GOOGLE_CLIENT_SECRET
        sync: false
      - key: OAUTH_MICROSOFT_CLIENT_ID
        sync: false
      - key: OAUTH_MICROSOFT_CLIENT_SECRET
        sync: false
      - key: OAUTH_APPLE_CLIENT_ID
        sync: false
      - key: OAUTH_APPLE_CLIENT_SECRET
        sync: false
      - key: OAUTH_APPLE_TEAM_ID
        sync: false
      - key: OAUTH_APPLE_KEY_ID
        sync: false

  # Background job runner (cron)
  - type: cron
    name: bhapi-jobs
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: starter
    region: frankfurt
    schedule: "*/5 * * * *"
    dockerCommand: "python -m src.jobs"  # Entrypoint runs migrations first, then execs this
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: bhapi-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: bhapi-redis
          type: redis
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: SENDGRID_API_KEY
        sync: false
      - key: GCP_PROJECT_ID
        sync: false

  # Real-time WebSocket service (JWT auth, presence, messaging, pub/sub)
  # ADR-008: Separate process for long-lived WebSocket connections
  - type: web
    name: bhapi-realtime
    runtime: docker
    plan: starter
    region: frankfurt
    dockerfilePath: ./Dockerfile.realtime
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: bhapi-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: bhapi-redis
          type: redis
          property: connectionString
      - key: SECRET_KEY
        sync: false
      - key: ENVIRONMENT
        value: production
      - key: DB_POOL_SIZE
        value: "10"

databases:
  - name: bhapi-db
    plan: starter
    region: frankfurt
    postgresMajorVersion: "16"
    databaseName: bhapi
    user: bhapi

  # Redis 7 — required for WebSocket pub/sub, rate limiting, presence
  - name: bhapi-redis
    type: redis
    plan: starter
    region: frankfurt
    maxmemoryPolicy: allkeys-lru
    ipAllowList: [] # Only allow connections from Render services
