# Project metadata (not an installable package — deps in requirements.txt)
# Render deploys via Dockerfile, not pip install.

[tool.ruff]
target-version = "py311"
line-length = 120

[tool.ruff.lint]
select = ["E", "F", "I", "W"]

[tool.ruff.lint.per-file-ignores]
"src/email/templates.py" = ["E501"]
"src/legal/content.py" = ["E501"]
"src/risk/safety_classifier.py" = ["E501"]
"src/reporting/generators/base.py" = ["E501"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
