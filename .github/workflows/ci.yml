name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:
    inputs:
      run_production_tests:
        description: "Run production E2E tests"
        type: boolean
        default: false

env:
  PYTHON_VERSION: "3.11"
  NODE_VERSION: "20"
  ENVIRONMENT: test
  DATABASE_URL: "sqlite+aiosqlite://"
  SECRET_KEY: "test-secret-key-for-ci-only-not-real"
  REDIS_URL: ""

jobs:
  backend-tests:
    name: Backend Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Dependency audit
        run: pip-audit --desc || echo "WARNING: pip-audit found vulnerabilities"

      - name: Lint with ruff
        run: ruff check src/ tests/

      # TODO: Make mypy strict once type errors are fixed
      - name: Type check with mypy
        run: mypy src/ --ignore-missing-imports --no-error-summary 2>&1 | tee mypy-output.txt || true

      - name: Run tests
        run: pytest tests/ -v --tb=short -x

  frontend-checks:
    name: Frontend Checks
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: portal

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: portal/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Run tests
        run: npx vitest run

  extension-build:
    name: Extension Build
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: extension

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: extension/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Build extension
        run: npm run build

  mobile-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: mobile/package-lock.json
      - run: npm ci
      - run: npx turbo run test

  security-tests:
    runs-on: ubuntu-latest
    env:
      RATE_LIMIT_FAIL_OPEN: "true"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
      - run: pip install -r requirements.txt -r requirements-dev.txt
      - name: Security tests
        run: pytest tests/security/ -v --tb=short

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-checks, extension-build, mobile-tests, security-tests]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: bhapi-ai-portal:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

  production-e2e:
    name: Production E2E Tests
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.run_production_tests }}
    needs: [backend-tests]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Run production E2E tests
        env:
          PROD_BASE_URL: ${{ secrets.PROD_BASE_URL }}
          PROD_API_KEY: ${{ secrets.PROD_API_KEY }}
        run: pytest tests/e2e/test_production.py -v --tb=short
